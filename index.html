<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我家冰箱 · 云同�?/title>
<link rel="manifest" crossorigin="use-credentials">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我家冰箱">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFF8F0;--dad:#5B8FD4;--dad-l:#EBF2FF;--dad-b:#B8D0F0;
  --mom:#E8936A;--mom-l:#FFF3EC;--mom-b:#F5C9A8;
  --red:#FF4757;--yellow:#FFA502;--green:#2ED573;--purple:#7B5EA7;
  --shadow:0 8px 32px rgba(0,0,0,.08);--r:24px;--rs:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);min-height:100vh;
  background-image:radial-gradient(circle at 20% 20%,rgba(91,143,212,.06) 0%,transparent 50%),
  radial-gradient(circle at 80% 80%,rgba(232,147,106,.06) 0%,transparent 50%)}
.app-header{text-align:center;padding:28px 20px 12px}
.app-title{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:#3a3a3a;letter-spacing:2px}
.app-subtitle{font-size:.78rem;color:#999;margin-top:4px;letter-spacing:1px}
.header-actions{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.sync-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#5B8FD4,#7B5EA7);color:white;font-size:.72rem;padding:5px 14px;border-radius:20px;animation:pulse-sync 2s infinite}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.75}}
.sync-dot{width:6px;height:6px;background:#7fff7f;border-radius:50%}
.voice-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF6B9D,#FF8E53);color:white;font-size:.72rem;padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.voice-btn:hover{transform:scale(1.05);box-shadow:0 4px 14px rgba(255,107,157,.4)}
.voice-btn.speaking{animation:vpulse .8s infinite alternate}
@keyframes vpulse{from{box-shadow:0 0 0 0 rgba(255,107,157,.5)}to{box-shadow:0 0 0 8px rgba(255,107,157,0)}}
.voice-panel{background:linear-gradient(135deg,#FFF0F8,#F8F0FF);border:1.5px solid #F0D0F0;border-radius:var(--rs);padding:14px 16px;margin:0 20px 12px;display:none}
.voice-panel.open{display:block}
.vp-title{font-size:.8rem;color:#9B5EA7;font-weight:600;margin-bottom:10px}
.vp-btns{display:flex;flex-wrap:wrap;gap:8px}
.vp-btn{background:white;border:1.5px solid #E0C0F0;border-radius:10px;padding:8px 14px;font-size:.8rem;font-family:inherit;cursor:pointer;color:#7B5EA7;transition:all .18s}
.vp-btn:hover{background:#F3EEFF;transform:translateY(-1px)}
.family-bar{display:flex;justify-content:center;gap:16px;padding:10px 20px 16px}
.avatar{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.av-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:3px solid transparent;transition:all .2s}
.avatar.dad .av-icon{background:var(--dad-l);border-color:var(--dad-b)}
.avatar.mom .av-icon{background:var(--mom-l);border-color:var(--mom-b)}
.avatar.kid .av-icon{background:#E8FFF8;border-color:#A8E6D4}
.av-lbl{font-size:.7rem;color:#888}
.avatar.active .av-icon{transform:scale(1.12);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.tabs{display:flex;margin:0 20px 20px;background:white;border-radius:18px;padding:5px;box-shadow:var(--shadow)}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:14px;font-size:.83rem;font-family:inherit;cursor:pointer;transition:all .25s;color:#999;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.tdad{background:linear-gradient(135deg,var(--dad),#7AB0E8);color:white;box-shadow:0 4px 16px rgba(91,143,212,.4)}
.tab.tmom{background:linear-gradient(135deg,var(--mom),#F0B090);color:white;box-shadow:0 4px 16px rgba(232,147,106,.4)}
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:white;border-radius:var(--r);padding:20px;margin:0 20px 16px;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:1rem;font-weight:700;color:#3a3a3a;display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;text-align:center;padding:10px 6px;border-radius:12px;font-size:.7rem;color:#777}
.stat .n{font-size:1.3rem;font-weight:700;display:block;margin-bottom:2px}
.s-ok{background:#F0FFF5}.s-ok .n{color:#27ae60}
.s-warn{background:#FFF8F0}.s-warn .n{color:var(--mom)}
.s-low{background:#FFF0F0}.s-low .n{color:var(--red)}
.search{display:flex;align-items:center;background:#F5F7FA;border-radius:12px;padding:10px 14px;margin-bottom:12px;gap:8px}
.search input{border:none;background:transparent;font-size:.85rem;font-family:inherit;outline:none;flex:1;color:#555}
.search input::placeholder{color:#bbb}
.import-row{display:flex;gap:8px;margin-bottom:12px}
.btn-scan{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#43B89C,#2ED573);color:white;border:none;border-radius:12px;padding:11px 14px;font-size:.82rem;font-family:inherit;cursor:pointer;transition:all .2s;flex:1;justify-content:center}
.btn-scan:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(46,213,115,.35)}
.btn-order{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FF6B35,#FF8E53);color:white;border:none;border-radius:12px;padding:11px 14px;font-size:.82rem;font-family:inherit;cursor:pointer;transition:all .2s;flex:1;justify-content:center}
.btn-order:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,107,53,.35)}
.inv-item{display:flex;align-items:center;padding:11px 12px;border-radius:var(--rs);margin-bottom:8px;background:#FAFAFA;border:1.5px solid #F0F0F0;transition:all .2s;gap:9px}
.inv-item:hover{border-color:var(--dad-b);background:var(--dad-l);transform:translateX(2px)}
.i-emoji{font-size:1.5rem;width:32px;text-align:center;cursor:pointer;flex-shrink:0}
.i-info{flex:1;min-width:0}
.i-name{font-size:.88rem;font-weight:600;color:#3a3a3a}
.i-qty{font-size:.73rem;color:#999;margin-top:1px}
.thresh-row{display:flex;align-items:center;gap:4px;margin-top:3px}
.thresh-lbl{font-size:.66rem;color:#ccc}
.thresh-inp{width:42px;border:1px solid #E8E8E8;border-radius:6px;padding:2px 4px;font-size:.68rem;font-family:inherit;text-align:center;outline:none;color:#666}
.thresh-inp:focus{border-color:var(--dad)}
.stag{font-size:.64rem;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tok{background:#E8FFF0;color:#27ae60}
.twarn{background:#FFF8E8;color:#f39c12}
.tlow{background:#FFF0F0;color:#e74c3c}
.i-acts{display:flex;gap:3px}
.bicon{width:26px;height:26px;border:none;border-radius:7px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bicon:hover{transform:scale(1.1)}
.bplus{background:#E8F5E9;color:#27ae60}
.bminus{background:#FDECEA;color:#e74c3c}
.bdel{background:#F5F5F5;color:#999}
.add-form{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.add-form input,.add-form select{border:1.5px solid #E8E8E8;border-radius:10px;padding:8px 10px;font-size:.8rem;font-family:inherit;outline:none;transition:border-color .2s;background:white}
.add-form input:focus,.add-form select:focus{border-color:var(--dad)}
.add-form .fn{flex:2;min-width:80px}
.add-form .fe{width:48px;text-align:center;cursor:pointer}
.add-form .fq{width:58px}
.add-form .fm{width:52px}
.btn-add{background:linear-gradient(135deg,var(--dad),#7AB0E8);color:white;border:none;border-radius:10px;padding:8px 14px;font-size:.8rem;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(91,143,212,.4)}
.form-hint{font-size:.68rem;color:#ccc;margin-top:5px}
.alert-box{background:linear-gradient(135deg,#FFF9E6,#FFF3D0);border:1.5px solid #FFD88A;border-radius:var(--rs);padding:12px 16px;display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:#7A5500;line-height:1.5}
.f-item{display:flex;align-items:center;padding:12px 14px;border-radius:var(--rs);margin-bottom:8px;gap:12px;border:1.5px solid transparent;transition:all .2s}
.f-item:hover{transform:translateX(2px)}
.fred{background:#FFF5F5;border-color:#FFB3B3}
.fyellow{background:#FFFDF0;border-color:#FFE082}
.fgreen{background:#F5FFF8;border-color:#B2EBC4}
.fdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.dred{background:var(--red);box-shadow:0 0 8px rgba(255,71,87,.5)}
.dyellow{background:var(--yellow);box-shadow:0 0 8px rgba(255,165,2,.5)}
.dgreen{background:var(--green);box-shadow:0 0 8px rgba(46,213,115,.4)}
.f-info{flex:1}.f-name{font-size:.9rem;font-weight:600;color:#3a3a3a}
.f-days{font-size:.73rem;color:#888;margin-top:2px}.f-days b{font-weight:700}
.flbl{font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:700}
.lred{background:var(--red);color:white}
.lyellow{background:var(--yellow);color:white}
.lgreen{background:var(--green);color:white}
.ing-sel{background:#FAFBFF;border-radius:14px;padding:14px;margin-bottom:14px}
.ing-sel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ing-sel-title{font-size:.82rem;font-weight:600;color:var(--dad)}
.sel-all{font-size:.72rem;color:var(--purple);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 12px;border-radius:20px;font-size:.78rem;cursor:pointer;border:1.5px solid #E0E0E0;background:white;color:#666;transition:all .18s;user-select:none;display:flex;align-items:center;gap:5px}
.chip.on{background:#EEE8FF;border-color:var(--purple);color:var(--purple);font-weight:600}
.todo{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--rs);margin-bottom:8px;background:#FAFAFA;border:1.5px solid #F0F0F0;transition:all .25s;cursor:pointer}
.todo.done{background:#F5FFF8;border-color:#C8EDD4;opacity:.8}
.todo.done .tname{text-decoration:line-through;color:#aaa}
.tchk{width:22px;height:22px;border-radius:6px;border:2px solid #DDD;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:.8rem}
.todo.done .tchk{background:var(--green);border-color:var(--green);color:white}
.tname{font-size:.88rem;color:#3a3a3a;flex:1}
.ai-btn{width:100%;background:linear-gradient(135deg,#7B5EA7,#A07CC8);color:white;border:none;border-radius:var(--rs);padding:14px 20px;font-size:.9rem;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;box-shadow:0 4px 20px rgba(123,94,167,.3);margin-top:4px}
.ai-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(123,94,167,.45)}
.wand{animation:wspin 3s infinite}
@keyframes wspin{0%,80%,100%{transform:rotate(0)}85%{transform:rotate(-15deg)}90%{transform:rotate(15deg)}95%{transform:rotate(-10deg)}}
.kid-scene{background:linear-gradient(160deg,#C8F0E8 0%,#A8E8FF 40%,#B8F0D8 100%);border-radius:var(--r);margin:0 20px 16px;padding:24px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kid-scene::before{content:'';position:absolute;inset:0;background:repeating-radial-gradient(ellipse at 50% 80%,transparent 0,transparent 18px,rgba(255,255,255,.12) 19px,transparent 20px);pointer-events:none}
.otter-wrap{display:flex;justify-content:center;margin-bottom:14px}
.otter-svg{width:155px;height:155px;animation:ofloat 3s ease-in-out infinite;filter:drop-shadow(0 8px 20px rgba(0,100,100,.2))}
@keyframes ofloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.otter-svg.dance{animation:odance .5s ease-in-out 3}
@keyframes odance{0%,100%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-15px) rotate(-8deg)}75%{transform:translateY(-8px) rotate(8deg)}}
.bubble{background:white;border-radius:18px 18px 18px 4px;padding:10px 16px;font-size:.88rem;color:#3a3a3a;box-shadow:0 4px 14px rgba(0,0,0,.1);line-height:1.5;margin-bottom:14px;position:relative;max-width:280px;margin-left:auto;margin-right:auto;text-align:center}
.bubble::after{content:'';position:absolute;left:18px;bottom:-10px;border:5px solid transparent;border-top-color:white}
.star-track{background:rgba(255,255,255,.55);border-radius:16px;padding:14px 16px}
.star-lbl{font-size:.78rem;color:#3a8a6a;font-weight:600;margin-bottom:8px}
.stars{display:flex;gap:6px;margin-bottom:10px}
.star{font-size:1.6rem;cursor:pointer;transition:transform .2s}
.star:hover{transform:scale(1.3)}
.star.lit{animation:spop .3s ease}
@keyframes spop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.vbadges{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.vbadge{background:white;border-radius:10px;padding:7px 12px;font-size:.78rem;color:#3a8a6a;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:5px;cursor:pointer;border:2px solid transparent;transition:all .15s;user-select:none}
.vbadge.ate{border-color:#43B89C;background:#E8FFF5}
.vbadge.ate .blbl{text-decoration:line-through;color:#aaa}
.otter-msg{font-family:'Ma Shan Zheng',cursive;font-size:1.1rem;color:#1a6a52;text-align:center;margin-top:12px;min-height:28px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:white;border-radius:28px 28px 0 0;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:24px 24px 48px;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.overlay.open .sheet{transform:translateY(0)}
.m-handle{width:40px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 20px}
.m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.m-title{font-size:1rem;font-weight:700;color:#3a3a3a}
.m-close{border:none;background:#F5F5F5;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:.8rem;font-family:inherit}
.r-sec{margin-top:14px}
.r-sec h4{font-size:.8rem;color:#888;margin-bottom:8px;font-weight:500;letter-spacing:.5px}
.r-step{display:flex;gap:10px;margin-bottom:8px;font-size:.85rem;color:#444;line-height:1.5}
.r-num{width:22px;height:22px;background:var(--purple);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.itags{display:flex;flex-wrap:wrap;gap:6px}
.itag{background:#F3EEFF;color:#7B5EA7;padding:4px 10px;border-radius:12px;font-size:.75rem;font-weight:500}
.ldots{display:flex;gap:6px;align-items:center;justify-content:center;padding:20px}
.ldots span{width:8px;height:8px;background:var(--purple);border-radius:50%;animation:dbounce 1.2s infinite}
.ldots span:nth-child(2){animation-delay:.2s}.ldots span:nth-child(3){animation-delay:.4s}
@keyframes dbounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-8px);opacity:1}}
.ocr-drop{border:2px dashed #C8E6C9;border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#FAFFF8;display:block}
.ocr-drop:hover{border-color:#43B89C;background:#F0FFF8}
.ocr-drop input{display:none}
.ocr-ico{font-size:2.5rem;margin-bottom:10px}
.ocr-hint{font-size:.82rem;color:#999;line-height:1.6}
.ocr-prev{max-width:100%;max-height:220px;object-fit:contain;border-radius:12px;margin:10px 0;display:block}
.ocr-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:#F5F5F5;margin-bottom:7px}
.ocr-chk{width:22px;height:22px;border-radius:6px;border:2px solid #DDD;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;transition:all .15s}
.ocr-chk.on{background:#43B89C;border-color:#43B89C;color:white}
.ocr-row input{border:1px solid #DDD;border-radius:6px;padding:3px 8px;font-size:.82rem;font-family:inherit;outline:none}
.ocr-row input:focus{border-color:#43B89C}
.oni{flex:1}.oqi{width:52px;text-align:center}
.conf{font-size:.65rem;font-weight:600;margin-left:4px}
.btn-ocr-import{width:100%;background:linear-gradient(135deg,#43B89C,#2ED573);color:white;border:none;border-radius:12px;padding:13px;font-size:.9rem;font-family:inherit;cursor:pointer;margin-top:12px;transition:all .2s}
.btn-ocr-import:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(67,184,156,.4)}
.emoji-search{width:100%;border:1.5px solid #E8E8E8;border-radius:10px;padding:9px 14px;font-size:.85rem;font-family:inherit;outline:none;margin-bottom:12px;box-sizing:border-box}
.emoji-search:focus{border-color:var(--dad)}
.ecat-title{font-size:.75rem;color:#888;font-weight:600;margin-bottom:6px;letter-spacing:.5px}
.ecat{margin-bottom:14px}
.egrid{display:flex;flex-wrap:wrap;gap:3px}
.ebtn{font-size:1.5rem;cursor:pointer;padding:5px;border-radius:8px;transition:background .15s;line-height:1}
.ebtn:hover{background:#F0F0F0}
.merge-opt{width:100%;border:none;border-radius:12px;padding:12px 16px;font-size:.85rem;font-family:inherit;cursor:pointer;text-align:left;margin-bottom:8px;transition:all .2s}
.merge-opt:hover{transform:translateY(-1px)}
.mo-green{background:linear-gradient(135deg,#43B89C,#2ED573);color:white}
.mo-blue{background:#EEF4FF;color:#5B8FD4;border:1.5px solid #C8D8F8}
.mo-gray{background:#F5F5F5;color:#999}
.csync{font-size:.75rem;color:#aaa;display:flex;align-items:center;gap:6px}
.csync.syncing{color:var(--dad)}
.spin{animation:spin 1.5s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2c2c;color:white;padding:10px 20px;border-radius:24px;font-size:.82rem;opacity:0;transition:all .3s;z-index:2000;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bot{height:32px}
.rc-section{background:#F8F9FF;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.rc-label{font-size:.82rem;font-weight:700;color:#3a3a3a;margin-bottom:2px}
.rc-edit-btn{font-size:.72rem;color:var(--dad);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline}
.dish-count-row{display:flex;align-items:center;margin:10px 0 10px;background:white;border-radius:14px;width:fit-content;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.dc-btn{width:44px;height:44px;border:none;background:white;font-size:1.4rem;cursor:pointer;color:#5B8FD4;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.dc-btn:hover{background:#EBF2FF}
.dc-display{padding:0 20px;display:flex;align-items:baseline;gap:4px;border-left:1px solid #F0F0F0;border-right:1px solid #F0F0F0}
#dish-count-num{font-size:1.6rem;font-weight:700;color:#3a3a3a}
.dc-unit{font-size:.8rem;color:#999}
.meal-type-row{display:flex;gap:8px;flex-wrap:wrap}
.meal-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #E0E0E0;background:white;font-size:.8rem;font-family:inherit;cursor:pointer;color:#888;transition:all .18s}

/* ── callAI: 调用自己�?/api/qwen 后端 ─────────────────── */
function callAI(body,onSuccess,onCorsError,onOtherError){
  // body 格式: {model,system,messages,max_tokens}
  var qwenBody={model:body.model||'qwen-plus',messages:body.messages||[],max_tokens:body.max_tokens||1500};
  if(body.system){qwenBody.messages=[{role:'system',content:body.system}].concat(qwenBody.messages);}
  fetch(AI_API_URL+'/api/qwen',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(qwenBody)
  })
  .then(function(r){
    if(!r.ok){return r.text().then(function(t){var m='HTTP '+r.status;try{var e=JSON.parse(t);m+=': '+(e.error&&(typeof e.error==='string'?e.error:e.error.message)||t.substring(0,200));}catch(x){m+=': '+t.substring(0,200);}throw{type:'api',msg:m};});}
    return r.json();
  })
  .then(function(data){
    if(data.error)throw{type:'api',msg:typeof data.error==='string'?data.error:data.error.message||JSON.stringify(data.error)};
    var raw=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    if(!raw)throw{type:'empty',msg:'API 返回内容为空'};
    onSuccess(raw,data);
  })
  .catch(function(err){
    var msg=err.msg||err.message||String(err);
    var isCors=(err.type==null)&&(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0||msg.indexOf('Load failed')>=0);
    console.error('[AI Error]',msg);
    if(isCors&&onCorsError)onCorsError(msg);
    else if(onOtherError)onOtherError(msg);
  });
}
function safeParseJSON(raw){
  var t=raw.replace(/```json/g,'').replace(/```/g,'').trim();
  try{return JSON.parse(t);}catch(e){}
  var s=t.indexOf('{'),en=t.lastIndexOf('}');
  if(s>=0&&en>s){try{return JSON.parse(t.substring(s,en+1));}catch(e){}}
  s=t.indexOf('[');en=t.lastIndexOf(']');
  if(s>=0&&en>s){try{return JSON.parse(t.substring(s,en+1));}catch(e){}}
  return null;
}
